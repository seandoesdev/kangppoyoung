services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: policyfund
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    # 컨텍스트=루트: backend(Java) + pipeline(Python) 를 한 이미지에 함께 빌드(설계 §16.6 A).
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      # 파이프라인 산출물(out/**/chunks.jsonl)을 읽기전용으로 마운트 → 부팅 시 벡터DB 자동 적재.
      - ./out:/app/out:ro

  frontend:
    # Vite 정적 빌드를 자체 nginx 로 서빙(SPA 폴백). 엣지 nginx 가 / 를 이 서비스로 프록시.
    build: ./frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # 기본 80. 로컬에서 호스트 80이 점유 중이면 .env 의 NGINX_PORT 로 오버라이드.
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
      - frontend

volumes:
  mysql-data:
