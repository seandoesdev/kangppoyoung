# 레이트리밋 존(PRD §9 레이트리밋). 대상 엔드포인트는 P2/P3 에서 활성화된다.
limit_req_zone $binary_remote_addr zone=search:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=preprocess:10m rate=5r/m;

server {
    listen 80;
    client_max_body_size 50m;   # PDF 업로드 50MB 허용 (PRD §9 파일업로드 하드닝)

    # Docker 임베디드 DNS. upstream 을 시작 시점이 아니라 요청 시점에 해석하게 하여
    # backend 컨테이너보다 먼저 떠도 "host not found in upstream" 으로 죽지 않게 한다.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_host backend;
    set $frontend_host frontend;

    # 변경성·고위험 경로의 사내 IP 제한(PRD §9 보안).
    # 운영 대역에 맞게 allow 값을 조정한다.
    location ~ ^/api/v1/notices/[^/]+/revisions {
        limit_req zone=preprocess burst=3 nodelay;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://$backend_host:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/v1/search {
        limit_req zone=search burst=10 nodelay;
        proxy_pass http://$backend_host:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/ {
        proxy_pass http://$backend_host:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /actuator/health {
        proxy_pass http://$backend_host:8080$request_uri;
    }

    # 프론트엔드 SPA — 정적 빌드는 frontend 컨테이너가 서빙(클라이언트 라우팅은 그쪽 try_files).
    # /api/v1·/actuator 보다 덜 구체적이라 위 location 들이 우선 매칭된다.
    location / {
        proxy_pass http://$frontend_host:80$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
