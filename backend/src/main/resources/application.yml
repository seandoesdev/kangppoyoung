spring:
  application:
    name: policyfund-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # real key via OPENAI_API_KEY env; default sk-noop lets the context start without a key (only real calls fail)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-noop}
      chat:
        options:
          model: gpt-4o

# 검색 파이프라인: 벡터(코사인) 검색 + 오프라인 해싱 임베딩 + 부팅 시 out/**/chunks.jsonl 자동 적재.
search:
  retrieval: vector
  embedding:
    provider: hash
  synth:
    provider: offline   # 키 없이 동작(검색 후보를 근거로 제시). OpenAI 합성은 openai 로 전환.
  ingest:
    on-startup: true

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
