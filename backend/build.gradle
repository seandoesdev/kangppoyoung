plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.5'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.policyfund'
version = '0.1.0'

// Docker Desktop 29.x(API 1.53)는 구버전 docker-java의 named-pipe 요청을 400으로 거부한다.
// Spring Boot BOM의 testcontainers를 최신 docker-java 포함 버전으로 상향한다.
ext['testcontainers.version'] = '1.21.4'

java {
    toolchain {
        // PRD 의도대로 Java 21 LTS 사용. JDK 25는 Testcontainers/docker-java(named-pipe)와
        // 비호환이라 통합테스트가 기동 전 실패하므로, 안정 LTS(21)로 고정한다.
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.ai:spring-ai-bom:1.0.0'
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-mysql'
    implementation 'org.springframework.ai:spring-ai-starter-model-openai'
    implementation 'org.apache.pdfbox:pdfbox:3.0.3'
    runtimeOnly 'com.mysql:mysql-connector-j'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:mysql'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs '-Dnet.bytebuddy.experimental=true'
}
